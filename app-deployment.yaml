apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistics-tracker-app
  labels:
    app: logistics-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logistics-tracker
  template:
    metadata:
      labels:
        app: logistics-tracker
    spec:
      containers:
      - name: app
        image: shaikhamadi/logistics-tracker-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/logistics-tracker"
        - name: JWT_SECRET
          value: "your-super-secret-jwt-key-change-this-in-production"
        - name: RATE_LIMIT_WINDOW_MS
          value: "900000"
        - name: RATE_LIMIT_MAX_REQUESTS
          value: "100"
        - name: API_VERSION
          value: "v1"
        - name: SESSION_SECRET
          value: "your-session-secret-change-this-too"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "const http = require('http'); const options = { host: 'localhost', port: 3000, path: '/api/health', timeout: 2000 }; const req = http.request(options, (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }); req.on('error', () => process.exit(1)); req.on('timeout', () => { req.destroy(); process.exit(1); }); req.end();"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: logistics-tracker-service
spec:
  selector:
    app: logistics-tracker
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  type: LoadBalancer
